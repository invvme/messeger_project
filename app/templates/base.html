<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <title>Messenger</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
    <nav class="navbar navbar-light bg-light border-bottom">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.index') }}">Messenger</a>
            {% if current_user.is_authenticated %}
                <div>
                    <span class="me-3">{{ current_user.username }}</span>
                    <a class="btn btn-outline-dark btn-sm" href="{{ url_for('auth.logout') }}">Выйти</a>
                </div>
            {% else %}
                <div>
                    <a class="btn btn-primary btn-sm" href="{{ url_for('auth.register') }}">Зарегистрироваться</a>
                    <a class="btn btn-success btn-sm" href="{{ url_for('auth.login') }}">Войти</a>
                </div>
            {% endif %}
        </div>
    </nav>
</header>

<main class="container py-4">
    {% if message %}
        <div class="alert alert-warning" role="alert">
            {{ message }}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</main>

</body>
</html>
