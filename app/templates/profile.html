{% extends "base.html" %}

{% block content %}
<h1>Профиль</h1>

<div class="row">
    <div class="col-md-4">
        <div class="card">
            <div class="card-body text-center">
                <img src="{{ url_for('static', filename='uploads/avatars/' + current_user.avatar) }}"
                     alt="Аватар" class="rounded-circle mb-3" width="150" height="150"
                     style="object-fit: cover; border: 3px solid var(--green-main);">
                <h5>{{ current_user.get_display_name() }}</h5>
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="avatar" class="form-label">Загрузить новый аватар</label>
                        <input type="file" class="form-control" id="avatar" name="avatar" accept="image/*">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Обновить аватар</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h4>Настройки</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label for="display_name" class="form-label">Отображаемое имя</label>
                        <input type="text" class="form-control" id="display_name" name="display_name"
                               value="{{ current_user.display_name or current_user.username }}">
                    </div>
                    <button type="submit" class="btn btn-accent">Сохранить имя</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
